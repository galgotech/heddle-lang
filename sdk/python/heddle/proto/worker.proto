syntax = "proto3";

package heddle.worker;

import "heddle/proto/locality.proto";

enum StatusCode {
  SUCCESS = 0;
  BUSINESS_ERROR = 1;
  FATAL_ERROR = 2;
}

message InitResourceRequest {
  string resource_name = 1;
  string config_json = 2; // For now, pass config as JSON
}

message InitResourceResponse {
  StatusCode status = 1;
  string resource_id = 2;
  string error_message = 3;
}

message ExecuteStepRequest {
  string step_name = 1;
  string resource_id = 2; // Can be empty if the step doesn't require a resource
  string config_json = 3; // Step configuration
  bytes input_table = 4; // Placeholder for Arrow buffer
  heddle.locality.FlightTicket input_ticket = 5;
}

message ExecuteStepResponse {
  StatusCode status = 1;
  bytes output_table = 2; // Placeholder for Arrow buffer
  string error_message = 3;
  string output_handle = 4;
}

message HandshakeRequest {
  string namespace = 1;
  string language = 2;
  string version = 3;
}

message HandshakeResponse {
  StatusCode status = 1;
  string error_message = 2;
}

message StepMetadata {
  string name = 1;
  string config_json_schema = 2;
  bool requires_resource = 3;
  string resource_name = 4;
}

message ResourceMetadata {
  string name = 1;
  string config_json_schema = 2;
}

message DescribeResponse {
  string namespace = 1;
  repeated StepMetadata steps = 2;
  repeated ResourceMetadata resources = 3;
}

message Empty {}

service PluginService {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse) {}
  rpc InitResource(InitResourceRequest) returns (InitResourceResponse) {}
  rpc ExecuteStep(ExecuteStepRequest) returns (ExecuteStepResponse) {}
  rpc Describe(Empty) returns (DescribeResponse) {}
}
